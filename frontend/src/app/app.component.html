@if (isLoading) {
  <div class="loader">
    <div class="jimu-primary-loading"></div>
  </div>
}

<div [style.visibility]="isLoading ? 'hidden' : 'visible'" [style.height]="isLoading ? '0' : 'auto'">
  <header>
    <app-header></app-header>
  </header>

  <main>
    <router-outlet></router-outlet>
  </main>

  <footer>
    <app-footer></app-footer>
  </footer>
</div>
